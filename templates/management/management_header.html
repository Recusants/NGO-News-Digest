<header class="app-header bg-white border-bottom px-4 fixed-top d-flex align-items-center">
    <div class="d-flex align-items-center h-100 w-100">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-link text-secondary p-2 sidebar-toggle" id="sidebarToggle" title="Toggle Sidebar (Ctrl+B)" style="text-decoration: none;">
                <i class="fas fa-bars fs-5"></i>
            </button>
            <div class="d-flex align-items-center gap-2 text-primary fw-bold fs-5 d-none d-md-flex">
                <i class="fas fa-hands-helping"></i>
                <span>NGO Admin</span>
            </div>
        </div>
        
        <div class="d-flex align-items-center gap-4 ms-auto">
            <div class="small text-secondary d-none d-sm-block" id="currentTime">
                <i class="fas fa-clock me-1"></i>
                <span>Loading...</span>
            </div>
            
            {% if request.user.is_authenticated %}
            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
                 onclick="window.location.href='{% url 'user_profile' %}'" 
                 title="{{ request.user.get_full_name|default:request.user.username }}"
                 style="width: 36px; height: 36px; cursor: pointer; transition: all 0.3s ease;">
                <span id="userInitials" class="fw-semibold small">
                    {{ request.user.get_full_name|default:request.user.username|slice:":2"|upper }}
                </span>
            </div>
            {% else %}
            <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" 
                 onclick="window.location.href='{% url 'login' %}'" 
                 title="Login"
                 style="width: 36px; height: 36px; cursor: pointer; transition: all 0.3s ease;">
                <span id="userInitials" class="fw-semibold small">AD</span>
            </div>
            {% endif %}
        </div>
    </div>
</header>

<style>
    .app-header {
        height: 60px;
        z-index: 1030;
    }
    
    .sidebar-toggle {
        transition: all 0.3s ease;
    }
    
    .sidebar-toggle:hover {
        background-color: #f8f9fa;
        border-radius: 0.375rem;
    }
    
    .rounded-circle.bg-primary:hover {
        background-color: #0b5ed7 !important;
        transform: scale(1.05);
    }
    
    @media (max-width: 768px) {
        .app-header {
            padding-left: 1rem;
            padding-right: 1rem;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const sidebarToggle = document.getElementById('sidebarToggle');
        if (sidebarToggle) {
            sidebarToggle.addEventListener('click', function() {
                if (window.innerWidth <= 991.98) {
                    // Mobile: toggle sidebar visibility
                    if (window.toggleMobileSidebar) {
                        window.toggleMobileSidebar();
                    }
                } else {
                    // Desktop: toggle collapsed state
                    if (window.toggleSidebar) {
                        window.toggleSidebar();
                    }
                }
            });
        }
        
        // Time display function
        function updateCurrentTime() {
            const now = new Date();
            const timeElement = document.getElementById('currentTime');
            if (timeElement) {
                const timeString = now.toLocaleTimeString('en-US', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    hour12: true 
                });
                timeElement.innerHTML = `<i class="fas fa-clock me-1"></i>${timeString}`;
            }
        }
        
        updateCurrentTime();
        setInterval(updateCurrentTime, 60000);
    });
</script>
