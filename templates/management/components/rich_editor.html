<!-- management/components/rich_editor.html -->
{% load static %}

<!-- Hidden input to store rich text content -->
<input type="hidden" id="{{ hidden_id }}" name="{{ hidden_id }}">

<!-- Native toolbar -->
<div class="editor-toolbar" role="toolbar" aria-label="text formatting tools" id="{{ editor_id }}_toolbar">
    <!-- Heading buttons -->
    <button type="button" class="editor-btn" id="{{ editor_id }}_p" title="Paragraph"><span>¶</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h1" title="Heading 1"><span>H1</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h2" title="Heading 2"><span>H2</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h3" title="Heading 3"><span>H3</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <!-- inline style buttons -->
    <button type="button" class="editor-btn" id="{{ editor_id }}_bold" title="bold"><span>𝐁</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_italic" title="italic"><span>𝐼</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_underline" title="underline"><span>𝑈</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_strike" title="strikethrough"><span>𝑆̶</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_ul" title="bullet list"><span>•</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_ol" title="numbered list"><span>1.</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_blockquote" title="quote"><span>❝</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_pre" title="code block"><span>⌨️</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_link" title="insert link"><span>🔗</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_unlink" title="remove link"><span>⛓️‍💥</span></button>
    
    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
    
    <button type="button" class="editor-btn" id="{{ editor_id }}_clear" title="clear formatting"><span>🧹</span></button>
</div>

<!-- Native editable content area -->
<div id="{{ editor_id }}" class="editor-content" contenteditable="true" role="textbox" aria-multiline="true" aria-label="rich text editor"></div>

<!-- Word count display -->
<div class="word-count" id="{{ editor_id }}_wordcount">words: 0</div>

<style>
    /* Basic editor styling */
    .editor-content {
        min-height: 300px;
        max-height: 500px;
        overflow-y: auto;
        padding: 1rem;
        border: 1px solid #dee2e6;
        border-radius: 0 0 0.375rem 0.375rem;
        background: white;
    }
    
    .editor-content:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 0.2rem rgba(var(--primary-rgb), 0.25);
    }
    
    .editor-content h1 { font-size: 2em; margin: 0.5em 0; }
    .editor-content h2 { font-size: 1.5em; margin: 0.5em 0; }
    .editor-content h3 { font-size: 1.2em; margin: 0.5em 0; }
    .editor-content p { margin: 1em 0; }
    .editor-content ul, .editor-content ol { padding-left: 2em; }
    .editor-content a { color: var(--primary); text-decoration: underline; }
    .editor-content blockquote {
        border-left: 4px solid #dee2e6;
        padding-left: 1rem;
        color: #6c757d;
        margin: 1em 0;
    }
    .editor-content pre {
        background: #f8f9fa;
        padding: 1rem;
        border-radius: 0.375rem;
        overflow-x: auto;
    }
    .editor-content code {
        background: #f8f9fa;
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
        font-family: monospace;
    }
</style>

<script>
(function() {
    // Initialize this editor instance
    const editor = document.getElementById('{{ editor_id }}');
    const hiddenField = document.getElementById('{{ hidden_id }}');
    const wordCountDisplay = document.getElementById('{{ editor_id }}_wordcount');
    
    if (!editor) return;
    
    // Update hidden field and word count
    function updateEditorState() {
        hiddenField.value = editor.innerHTML;
        
        const text = editor.innerText || editor.textContent || '';
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        wordCountDisplay.textContent = `words: ${words}`;
    }
    
    // Execute command and update state
    function execCommand(cmd, param = null) {
        editor.focus();
        document.execCommand(cmd, false, param);
        updateEditorState();
    }
    
    // Set up toolbar buttons
    document.getElementById('{{ editor_id }}_bold')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('bold'); 
    });
    
    document.getElementById('{{ editor_id }}_italic')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('italic'); 
    });
    
    document.getElementById('{{ editor_id }}_underline')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('underline'); 
    });
    
    document.getElementById('{{ editor_id }}_strike')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('strikeThrough'); 
    });
    
    document.getElementById('{{ editor_id }}_ul')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('insertUnorderedList'); 
    });
    
    document.getElementById('{{ editor_id }}_ol')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('insertOrderedList'); 
    });
    
    document.getElementById('{{ editor_id }}_blockquote')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('formatBlock', 'blockquote'); 
    });
    
    document.getElementById('{{ editor_id }}_pre')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('formatBlock', 'pre'); 
    });
    
    document.getElementById('{{ editor_id }}_link')?.addEventListener('click', function(e) {
        e.preventDefault();
        const url = prompt('Enter link URL (include https://)', 'https://');
        if (url && url.trim() !== '') {
            execCommand('createLink', url);
        }
    });
    
    document.getElementById('{{ editor_id }}_unlink')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('unlink');
    });
    
    document.getElementById('{{ editor_id }}_clear')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('removeFormat');
        document.execCommand('formatBlock', false, 'p');
        updateEditorState();
    });
    
    // Heading buttons
    document.getElementById('{{ editor_id }}_p')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'p');
    });
    
    document.getElementById('{{ editor_id }}_h1')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h1');
    });
    
    document.getElementById('{{ editor_id }}_h2')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h2');
    });
    
    document.getElementById('{{ editor_id }}_h3')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h3');
    });
    
    // Editor events
    editor.addEventListener('input', updateEditorState);
    editor.addEventListener('keyup', updateEditorState);
    
    // Prevent toolbar buttons from stealing focus
    document.querySelectorAll('#{{ editor_id }}_toolbar .editor-btn').forEach(function(el) {
        el.addEventListener('mousedown', function(e) { 
            e.preventDefault(); 
        });
    });
    
    // Initialize with empty paragraph for create mode
    if (editor.innerHTML === '') {
        editor.innerHTML = '<p><br></p>';
        updateEditorState();
    }
    
    // Make functions available globally for this editor instance
    window['get_{{ editor_id }}_content'] = function() {
        return hiddenField.value;
    };
    
    window['clear_{{ editor_id }}'] = function() {
        editor.innerHTML = '<p><br></p>';
        updateEditorState();
    };

    window['set_{{ editor_id }}'] = function(html) {
        editor.innerHTML = html;
        updateEditorState();
    };
})();
</script>
