<!-- management/components/rich_editor.html -->
{% load static %}

<!-- Hidden input to store rich text content -->
<input type="hidden" id="{{ hidden_id }}" name="{{ hidden_id }}">

<!-- Native toolbar -->
<div class="editor-toolbar" role="toolbar" aria-label="text formatting tools" id="{{ editor_id }}_toolbar">
    <!-- Heading buttons -->
    <button type="button" class="editor-btn" id="{{ editor_id }}_p" title="Paragraph"><span>¶</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h1" title="Heading 1"><span>H1</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h2" title="Heading 2"><span>H2</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_h3" title="Heading 3"><span>H3</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <!-- inline style buttons -->
    <button type="button" class="editor-btn" id="{{ editor_id }}_bold" title="bold"><span>𝐁</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_italic" title="italic"><span>𝐼</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_underline" title="underline"><span>𝑈</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_strike" title="strikethrough"><span>𝑆̶</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_ul" title="bullet list"><span>•</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_ol" title="numbered list"><span>1.</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_blockquote" title="quote"><span>❝</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_pre" title="code block"><span>⌨️</span></button>

    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>

    <button type="button" class="editor-btn" id="{{ editor_id }}_link" title="insert link"><span>🔗</span></button>
    <button type="button" class="editor-btn" id="{{ editor_id }}_unlink" title="remove link"><span>⛓️‍💥</span></button>
    
    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
    
    <!-- Image button with positioning dropdown -->
    <div style="display:inline-block; position:relative;">
        <button type="button" class="editor-btn" id="{{ editor_id }}_image" title="insert image"><span>🖼️</span></button>
        <div id="{{ editor_id }}_image_menu" class="image-position-menu" style="display:none; position:absolute; top:100%; left:0; background:white; border:1px solid #dee2e6; border-radius:4px; padding:5px; z-index:1000; min-width:150px;">
            <div style="padding:5px; font-weight:bold; border-bottom:1px solid #dee2e6; margin-bottom:5px;">Insert Image</div>
            <button type="button" class="image-menu-item" data-action="url" style="display:block; width:100%; text-align:left; padding:5px; border:none; background:none; cursor:pointer;">🌐 From URL</button>
            <button type="button" class="image-menu-item" data-action="upload" style="display:block; width:100%; text-align:left; padding:5px; border:none; background:none; cursor:pointer;">📁 Upload File</button>
        </div>
    </div>
    
    <!-- Image positioning buttons (visible when image selected) -->
    <div id="{{ editor_id }}_image_positioning" style="display:none; display:inline-block;">
        <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_left" title="float left"><span>◀</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_center" title="center"><span>↔</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_right" title="float right"><span>▶</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_block" title="block (full width)"><span>⬛</span></button>
        <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_small" title="small (25%)"><span>25%</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_medium" title="medium (50%)"><span>50%</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_large" title="large (75%)"><span>75%</span></button>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_full" title="full (100%)"><span>100%</span></button>
        <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
        <button type="button" class="editor-btn" id="{{ editor_id }}_img_delete" title="delete image"><span>🗑️</span></button>
    </div>
    
    <span class="editor-separator" style="width:2px; background:#dee2e6; margin:0 4px;"></span>
    
    <button type="button" class="editor-btn" id="{{ editor_id }}_clear" title="clear formatting"><span>🧹</span></button>
</div>

<!-- Native editable content area -->
<div id="{{ editor_id }}" class="editor-content" contenteditable="true" role="textbox" aria-multiline="true" aria-label="rich text editor"></div>

<!-- Word count display -->
<div class="word-count" id="{{ editor_id }}_wordcount">words: 0</div>

<style>
    /* Image styling in editor */
    .editor-content img {
        max-width: 100%;
        height: auto;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        padding: 4px;
        margin: 10px 0;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .editor-content img.selected {
        border: 2px solid #0d6efd;
        box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.25);
    }
    
    /* Image positioning classes */
    .editor-content img.float-left {
        float: left;
        margin-right: 20px;
        margin-bottom: 10px;
    }
    
    .editor-content img.float-right {
        float: right;
        margin-left: 20px;
        margin-bottom: 10px;
    }
    
    .editor-content img.center {
        display: block;
        margin-left: auto;
        margin-right: auto;
    }
    
    .editor-content img.block {
        display: block;
        width: 100%;
        margin: 10px 0;
    }
    
    /* Size classes */
    .editor-content img.size-small {
        width: 25%;
    }
    
    .editor-content img.size-medium {
        width: 50%;
    }
    
    .editor-content img.size-large {
        width: 75%;
    }
    
    .editor-content img.size-full {
        width: 100%;
    }
    
    /* Image menu styling */
    .image-menu-item:hover {
        background-color: #f0f0f0;
    }
    
    /* Hide positioning buttons by default */
    #{{ editor_id }}_image_positioning {
        display: none;
    }
</style>

<script>
(function() {
    // Initialize this editor instance
    const editor = document.getElementById('{{ editor_id }}');
    const hiddenField = document.getElementById('{{ hidden_id }}');
    const wordCountDisplay = document.getElementById('{{ editor_id }}_wordcount');
    const imagePositioning = document.getElementById('{{ editor_id }}_image_positioning');
    const imageMenu = document.getElementById('{{ editor_id }}_image_menu');
    let selectedImage = null;
    
    if (!editor) return;
    
    // Initialize editor content
    if (editor.innerHTML === '') {
        editor.innerHTML = '<p><br></p>';
    }
    
    // Update hidden field and word count
    function updateEditorState() {
        hiddenField.value = editor.innerHTML;
        
        const text = editor.innerText || editor.textContent || '';
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        wordCountDisplay.textContent = `words: ${words}`;
    }
    
    // Execute command and update state
    function execCommand(cmd, param = null) {
        editor.focus();
        document.execCommand(cmd, false, param);
        updateEditorState();
    }
    
    // Insert image from URL
    function insertImageFromUrl() {
        const url = prompt('Enter image URL:', 'https://');
        if (url && url.trim() !== '') {
            editor.focus();
            
            // Create image element
            const img = document.createElement('img');
            img.src = url;
            img.alt = 'Inserted image';
            img.classList.add('size-medium'); // Default size
            
            // Insert at cursor position
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(img);
                
                // Add paragraph after image
                const p = document.createElement('p');
                p.innerHTML = '<br>';
                range.insertNode(p);
                
                // Move cursor to new paragraph
                range.setStart(p, 0);
                range.setEnd(p, 0);
                selection.removeAllRanges();
                selection.addRange(range);
            }
            
            updateEditorState();
        }
        hideImageMenu();
    }
    
    // Insert image from file
    function insertImageFromFile(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            editor.focus();
            
            // Create image element
            const img = document.createElement('img');
            img.src = e.target.result;
            img.alt = file.name;
            img.classList.add('size-medium'); // Default size
            
            // Insert at cursor position
            const selection = window.getSelection();
            if (selection.rangeCount > 0) {
                const range = selection.getRangeAt(0);
                range.deleteContents();
                range.insertNode(img);
                
                // Add paragraph after image
                const p = document.createElement('p');
                p.innerHTML = '<br>';
                range.insertNode(p);
                
                // Move cursor to new paragraph
                range.setStart(p, 0);
                range.setEnd(p, 0);
                selection.removeAllRanges();
                selection.addRange(range);
            }
            
            updateEditorState();
        };
        reader.readAsDataURL(file);
        hideImageMenu();
    }
    
    // Toggle image menu
    function toggleImageMenu() {
        if (imageMenu.style.display === 'block') {
            hideImageMenu();
        } else {
            // Hide any other open menus
            hideImageMenu();
            imageMenu.style.display = 'block';
        }
    }
    
    function hideImageMenu() {
        if (imageMenu) {
            imageMenu.style.display = 'none';
        }
    }
    
    // Apply positioning to selected image
    function applyImagePosition(position) {
        if (!selectedImage) return;
        
        // Remove existing position classes
        selectedImage.classList.remove('float-left', 'float-right', 'center', 'block');
        
        // Add new position class
        if (position) {
            selectedImage.classList.add(position);
        }
        
        updateEditorState();
    }
    
    // Apply size to selected image
    function applyImageSize(size) {
        if (!selectedImage) return;
        
        // Remove existing size classes
        selectedImage.classList.remove('size-small', 'size-medium', 'size-large', 'size-full');
        
        // Add new size class
        if (size) {
            selectedImage.classList.add(size);
        }
        
        updateEditorState();
    }
    
    // Handle image selection
    editor.addEventListener('click', function(e) {
        if (e.target.tagName === 'IMG') {
            // Remove selected class from all images
            document.querySelectorAll(`#{{ editor_id }} img`).forEach(img => {
                img.classList.remove('selected');
            });
            
            // Add selected class to clicked image
            e.target.classList.add('selected');
            selectedImage = e.target;
            
            // Show positioning buttons
            if (imagePositioning) {
                imagePositioning.style.display = 'inline-block';
            }
            
            // Hide image menu
            hideImageMenu();
        } else {
            // Deselect image
            document.querySelectorAll(`#{{ editor_id }} img`).forEach(img => {
                img.classList.remove('selected');
            });
            selectedImage = null;
            
            // Hide positioning buttons
            if (imagePositioning) {
                imagePositioning.style.display = 'none';
            }
        }
    });
    
    // Handle right-click on image
    editor.addEventListener('contextmenu', function(e) {
        if (e.target.tagName === 'IMG') {
            e.preventDefault();
            
            Swal.fire({
                title: 'Image Options',
                html: `
                    <div style="text-align: left;">
                        <p><strong>Position:</strong></p>
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <button class="swal2-btn" onclick="applyPosition('float-left')">Left</button>
                            <button class="swal2-btn" onclick="applyPosition('center')">Center</button>
                            <button class="swal2-btn" onclick="applyPosition('float-right')">Right</button>
                            <button class="swal2-btn" onclick="applyPosition('block')">Block</button>
                        </div>
                        <p><strong>Size:</strong></p>
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <button class="swal2-btn" onclick="applySize('size-small')">25%</button>
                            <button class="swal2-btn" onclick="applySize('size-medium')">50%</button>
                            <button class="swal2-btn" onclick="applySize('size-large')">75%</button>
                            <button class="swal2-btn" onclick="applySize('size-full')">100%</button>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'Delete Image',
                cancelButtonText: 'Close',
                preConfirm: () => {
                    // Delete image
                    e.target.remove();
                    selectedImage = null;
                    if (imagePositioning) {
                        imagePositioning.style.display = 'none';
                    }
                    updateEditorState();
                }
            });
            
            // Make functions available for Swal
            window.applyPosition = function(pos) {
                e.target.classList.remove('float-left', 'float-right', 'center', 'block');
                if (pos !== 'none') {
                    e.target.classList.add(pos);
                }
                updateEditorState();
                Swal.close();
            };
            
            window.applySize = function(sz) {
                e.target.classList.remove('size-small', 'size-medium', 'size-large', 'size-full');
                e.target.classList.add(sz);
                updateEditorState();
                Swal.close();
            };
        }
    });
    
    // Image button click
    document.getElementById('{{ editor_id }}_image')?.addEventListener('click', function(e) {
        e.preventDefault();
        toggleImageMenu();
    });
    
    // Image menu items
    document.querySelectorAll('#{{ editor_id }}_image_menu .image-menu-item').forEach(item => {
        item.addEventListener('click', function(e) {
            e.preventDefault();
            const action = this.getAttribute('data-action');
            
            if (action === 'url') {
                insertImageFromUrl();
            } else if (action === 'upload') {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = function(e) {
                    if (e.target.files.length > 0) {
                        insertImageFromFile(e.target.files[0]);
                    }
                };
                fileInput.click();
            }
            
            hideImageMenu();
        });
    });
    
    // Close menu when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#{{ editor_id }}_image') && !e.target.closest('#{{ editor_id }}_image_menu')) {
            hideImageMenu();
        }
    });
    
    // Image positioning buttons
    document.getElementById('{{ editor_id }}_img_left')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImagePosition('float-left');
    });
    
    document.getElementById('{{ editor_id }}_img_center')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImagePosition('center');
    });
    
    document.getElementById('{{ editor_id }}_img_right')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImagePosition('float-right');
    });
    
    document.getElementById('{{ editor_id }}_img_block')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImagePosition('block');
    });
    
    // Image size buttons
    document.getElementById('{{ editor_id }}_img_small')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImageSize('size-small');
    });
    
    document.getElementById('{{ editor_id }}_img_medium')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImageSize('size-medium');
    });
    
    document.getElementById('{{ editor_id }}_img_large')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImageSize('size-large');
    });
    
    document.getElementById('{{ editor_id }}_img_full')?.addEventListener('click', function(e) {
        e.preventDefault();
        applyImageSize('size-full');
    });
    
    // Delete image button
    document.getElementById('{{ editor_id }}_img_delete')?.addEventListener('click', function(e) {
        e.preventDefault();
        if (selectedImage) {
            selectedImage.remove();
            selectedImage = null;
            imagePositioning.style.display = 'none';
            updateEditorState();
        }
    });
    
    // Set up other toolbar buttons
    document.getElementById('{{ editor_id }}_bold')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('bold'); 
    });
    
    document.getElementById('{{ editor_id }}_italic')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('italic'); 
    });
    
    document.getElementById('{{ editor_id }}_underline')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('underline'); 
    });
    
    document.getElementById('{{ editor_id }}_strike')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('strikeThrough'); 
    });
    
    document.getElementById('{{ editor_id }}_ul')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('insertUnorderedList'); 
    });
    
    document.getElementById('{{ editor_id }}_ol')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('insertOrderedList'); 
    });
    
    document.getElementById('{{ editor_id }}_blockquote')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('formatBlock', 'blockquote'); 
    });
    
    document.getElementById('{{ editor_id }}_pre')?.addEventListener('click', function(e) { 
        e.preventDefault(); 
        execCommand('formatBlock', 'pre'); 
    });
    
    document.getElementById('{{ editor_id }}_link')?.addEventListener('click', function(e) {
        e.preventDefault();
        const url = prompt('Enter link URL (include https://)', 'https://');
        if (url && url.trim() !== '') {
            execCommand('createLink', url);
        }
    });
    
    document.getElementById('{{ editor_id }}_unlink')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('unlink');
    });
    
    document.getElementById('{{ editor_id }}_clear')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('removeFormat');
        document.execCommand('formatBlock', false, 'p');
        updateEditorState();
    });
    
    // Heading buttons
    document.getElementById('{{ editor_id }}_p')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'p');
    });
    
    document.getElementById('{{ editor_id }}_h1')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h1');
    });
    
    document.getElementById('{{ editor_id }}_h2')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h2');
    });
    
    document.getElementById('{{ editor_id }}_h3')?.addEventListener('click', function(e) {
        e.preventDefault();
        execCommand('formatBlock', 'h3');
    });
    
    // Editor events
    editor.addEventListener('input', updateEditorState);
    editor.addEventListener('keyup', updateEditorState);
    
    // Prevent toolbar buttons from stealing focus
    document.querySelectorAll('#{{ editor_id }}_toolbar .editor-btn, #{{ editor_id }}_toolbar .image-menu-item').forEach(function(el) {
        el.addEventListener('mousedown', function(e) { 
            e.preventDefault(); 
        });
    });
    
    // Initial update
    updateEditorState();
    
    // Make functions available globally for this editor instance
    window['get_{{ editor_id }}_content'] = function() {
        return hiddenField.value;
    };
    
    window['clear_{{ editor_id }}'] = function() {
        editor.innerHTML = '<p><br></p>';
        updateEditorState();
    };
})();
</script>
